<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:15px;line-height:1.7;color:#1D1D1F;background:#FFFFFF;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{color:#1D1D1F;text-decoration:none;border-bottom:1px solid rgba(0,0,0,0.2);transition:border-color 200ms}
a:hover{border-color:#1D1D1F}

/* Route transition */
.fal-route-enter{animation:falRouteIn 600ms ease both}
@keyframes falRouteIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Scroll reveal */
.fal-reveal{opacity:0;transform:translateY(32px);transition:opacity 700ms ease,transform 700ms ease}
.fal-reveal.fal-visible{opacity:1;transform:translateY(0)}
.fal-reveal-d1{transition-delay:100ms}
.fal-reveal-d2{transition-delay:200ms}
.fal-reveal-d3{transition-delay:300ms}
.fal-reveal-d4{transition-delay:400ms}

/* Placeholder shapes */
.fal-ph{position:relative;overflow:hidden}
.fal-ph::after{content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.4) 50%,transparent 100%);animation:falShimmer 3s ease-in-out infinite}
@keyframes falShimmer{0%{left:-100%}100%{left:100%}}

/* Hero parallax-ish */
.fal-hero-bg{transition:transform 300ms ease-out}

/* Slow smooth scroll override */
html{scroll-behavior:smooth}

@media (prefers-reduced-motion:reduce){
  .fal-reveal{opacity:1;transform:none;transition:none}
  .fal-route-enter{animation:none}
  .fal-ph::after{animation:none}
}
ol,ul{padding-left:22px}
li{margin-bottom:8px}
p{margin:0 0 16px 0}
h1,h2,h3{letter-spacing:-0.02em;color:#1D1D1F;margin:0}
::selection{background:#D2D2D7;color:#1D1D1F}

/* TOC columns */
.fal-toc-list{columns:2;column-gap:24px}

/* Footer links */
.fal-footer-link{transition:color 120ms ease;border-bottom:none}
.fal-footer-link:hover{color:#6E6E73 !important}

/* Value prop hover lift */
.fal-vp{transition:transform 400ms cubic-bezier(0.25,0.1,0.25,1),box-shadow 400ms cubic-bezier(0.25,0.1,0.25,1);border-radius:12px}
.fal-vp:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.06)}

/* CTA link */
.fal-cta-link{transition:opacity 200ms ease}
.fal-cta-link:hover{opacity:0.6}

/* Privacy btn */
.fal-privacy-btn:hover{background:#1D1D1F !important;color:#FFFFFF !important}

@media (max-width:720px){
  .fal-page,.fal-header-inner,.fal-footer-inner{padding-left:20px !important;padding-right:20px !important}
  .fal-nav{gap:10px !important}
  .fal-jurisdiction{display:none !important}
  .fal-hero-title{font-size:clamp(36px,10vw,72px) !important}
}
@media print{
  .fal-no-print{display:none !important}
  body{font-size:11pt;color:#000;background:#fff}
  .fal-section{page-break-inside:auto;border:none !important;background:#fff !important}
}
</style>

        h('li', { key: 'd4', style: S.defItem }, h('span', { style: S.defTerm }, '"Falconia"'), ' means Falconia, a federal Canadian corporation, and any of its officers, directors, employees, contractors, and agents acting within the scope of their engagement.'),
        h('li', { key: 'd5', style: S.defItem }, h('span', { style: S.defTerm }, '"FSA"'), ' means Forward Sortation Area, the first three characters of a Canadian postal code.'),
        h('li', { key: 'd6', style: S.defItem }, h('span', { style: S.defTerm }, '"Identified Tier"'), ' means a Property Record that retains the civic address of the Subject Property and is attributable to a specific property and, by extension, to an identifiable individual or household.'),
        h('li', { key: 'd7', style: S.defItem }, h('span', { style: S.defTerm }, '"Owner"'), ' means the individual or entity that owns or occupies the Subject Property and has provided Consent.'),
        h('li', { key: 'd8', style: S.defItem }, h('span', { style: S.defTerm }, '"Permitted Uses"'), ' means the uses enumerated in §4 of these Terms.'),
        h('li', { key: 'd9', style: S.defItem }, h('span', { style: S.defTerm }, '"Privacy Officer"'), ' means the individual designated by Falconia under PIPEDA Principle 1 (Accountability) as the point of contact for all privacy-related matters.'),
        h('li', { key: 'd10', style: S.defItem }, h('span', { style: S.defTerm }, '"Property Record"'), ' means a structured, multi-attribute record derived from Source Material, comprising the exterior observable characteristics of a Subject Property as enumerated in §5 of the Data Processing description.'),
        h('li', { key: 'd11', style: S.defItem }, h('span', { style: S.defTerm }, '"Recipient"'), ' means any individual, corporation, partnership, government body, or other entity that receives Property Records from Falconia under a written licensing agreement.'),
        h('li', { key: 'd12', style: S.defItem }, h('span', { style: S.defTerm }, '"Services"'), ' means the record processing, licensing, and research services provided by Falconia.'),
        h('li', { key: 'd13', style: S.defItem }, h('span', { style: S.defTerm }, '"Site"'), ' means falconia.ca and all subdomains thereof.'),
        h('li', { key: 'd14', style: S.defItem }, h('span', { style: S.defTerm }, '"Source Material"'), ' means raw imagery, thermal recordings, metadata, and civic address information collected by the Affiliated Service Provider at the Subject Property and transmitted to Falconia for processing.'),
        h('li', { key: 'd15', style: S.defItem }, h('span', { style: S.defTerm }, '"Subject Property"'), ' means the residential property at which the Affiliated Service Provider performs a service visit and captures Source Material.')
      ]),

      // 2. DATA PROCESSING SERVICES
      h('h2', { key: 'h-2', id: 'tos-2', style: S.h2 }, '2. Data Processing Services'),
      Clause('2.1', 'Falconia receives Source Material from the Affiliated Service Provider and processes it into structured Property Records. Each Property Record comprises not fewer than fifteen (15) discrete exterior-observable attributes, as described in §5 of the Data Processing description.'),
      Clause('2.2', 'Falconia classifies each Property Record as either Identified Tier or De-identified Tier. The classification determines the licensing conditions, recipient restrictions, and safeguards applicable to the record.'),
      Clause('2.3', 'Falconia licenses Property Records to qualified Recipients under individually negotiated written agreements that incorporate these Terms and the Privacy Policy by reference.'),

      // 3. RECORD TIERS
      h('h2', { key: 'h-3', id: 'tos-3', style: S.h2 }, '3. Record Tiers'),
      Clause('3.1', 'Identified Tier records constitute personal information under PIPEDA. All PIPEDA protections, including consent, access, and correction rights, apply.'),
      Clause('3.2', 'De-identified Tier records are aggregated to a resolution at which no individual is reasonably identifiable, and are not considered personal information for the purposes of PIPEDA.'),
      Clause('3.3', 'Any attempt by a Recipient to re-identify a De-identified Tier record, to link a De-identified Tier record to a specific individual, or to combine De-identified Tier records with other data sources for the purpose of re-identification is a material breach of the licensing agreement.'),
      h('div', { key: 'cr-3', style: S.crossref }, 'See also: Privacy Policy §7 (De-identification Methodology); Data Processing §5 (Attribute Enumeration).'),

      // 4. PERMITTED USES
      h('h2', { key: 'h-4', id: 'tos-4', style: S.h2 }, '4. Permitted Uses'),
      h('p', { key: 'p4-pre' }, 'Identified Tier records may be used by a Recipient solely for one or more of the following Permitted Uses, and for no other purpose:'),
      h('ol', { key: 'p4-list' }, [
        h('li', { key: 'pu1' }, 'Property and casualty insurance underwriting, rating, and renewal review, including roof, envelope, and exterior risk assessment.'),
        h('li', { key: 'pu2' }, 'Mortgage origination, refinance, and portfolio due diligence, including pre-funding property condition verification.'),
        h('li', { key: 'pu3' }, 'Contractor and trade scoping, asset planning, and material estimation in relation to a property already under written contract or formal estimate request initiated by the Owner.'),
        h('li', { key: 'pu4' }, 'Public-records-style research, journalistic inquiry, or academic study where the Recipient is bound by an equivalent or stricter ethics regime.'),
        h('li', { key: 'pu5' }, 'Internal portfolio analytics, reserve analysis, and regulatory reporting by financial institutions and insurers.')
      ]),
      Clause('4.1', 'Any use not enumerated above is prohibited unless first approved in writing by the Privacy Officer. The following uses are prohibited: (a) marketing or solicitation of Owners; (b) sale or onward licensing of Identified Tier records to third parties; (c) credit, eligibility, or insurability decisions adverse to the Owner without independent verification; (d) any use that would breach PIPEDA, applicable provincial privacy legislation, or the Canadian Human Rights Act; and (e) any use that would constitute surveillance of an identifiable individual outside the scope of the original Consent.'),
      h('div', { key: 'cr-4', style: S.crossref }, 'See also: Privacy Policy §3 (Purposes of Processing); Privacy Policy §4 (Disclosure to Third Parties).'),

      // 5. NO-OUTREACH CLAUSE
      h('h2', { key: 'h-5', id: 'tos-5', style: S.h2 }, '5. No-Outreach Clause'),
      h('div', { key: 'co-5', style: S.callout },
        'Recipients may use property records for the Permitted Uses in §4 only. The No-Outreach Clause ensures that property records serve assessment, underwriting, and research purposes, and that Owners are protected from unsolicited commercial contact.'
      ),
      Clause('5.1', 'No Recipient shall, on the basis of any Identified Tier record or any inference derived therefrom, initiate any unsolicited commercial communication with any Owner, including without limitation: door-to-door canvassing, direct mail, telephone calls, text messages, e-mail, instant messaging, addressed advertising, programmatic advertising keyed to the Owner\'s address, or any equivalent form of solicitation.'),
      Clause('5.2', 'The prohibition in §5.1 applies to the Recipient, to all employees, contractors, agents, affiliates, and successors of the Recipient, and to any third party to whom the Recipient has, in breach of §4.1(b), disclosed any Identified Tier record or derivative thereof.'),
      Clause('5.3', 'The No-Outreach Clause does not prohibit a Recipient from communicating with an Owner pursuant to a pre-existing contractual relationship initiated by the Owner (for example, an active insurance policy, an active mortgage, or a contractor estimate requested by the Owner), provided that such communication does not reference, paraphrase, or rely upon any Property Record attribute.'),
      Clause('5.4', 'Breach of the No-Outreach Clause constitutes a material breach of the Recipient\'s licensing agreement and entitles Falconia to: (a) immediate termination of the licensing agreement; (b) liquidated damages in the amount stipulated in the agreement; (c) full indemnification for any complaint, investigation, or order arising under PIPEDA or any equivalent provincial statute; and (d) referral of the breach to the Office of the Privacy Commissioner of Canada and to any affected Owner.'),
      Clause('5.5', 'Falconia may audit Recipient compliance with the No-Outreach Clause through technical, contractual, or sampling means, and Recipients shall co-operate fully with any such audit.'),
      h('div', { key: 'cr-5', style: S.crossref }, 'See also: Privacy Policy §8 (Individual Rights); Data Processing §7 (Recipient Categories).'),

      // 6. RECIPIENT OBLIGATIONS
      h('h2', { key: 'h-6', id: 'tos-6', style: S.h2 }, '6. Recipient Obligations'),
      Clause('6.1', 'Each Recipient shall, at its own cost, maintain technical and organizational safeguards appropriate to the sensitivity of Property Records, including encryption in transit and at rest, role-based access controls, audit logging, and incident response procedures conforming to recognized industry standards.'),
      Clause('6.2', 'Each Recipient shall verify and document its legitimate business purpose for each request and shall maintain such documentation for not less than six (6) years from the date of receipt of the relevant Property Record.'),
      Clause('6.3', 'Onward Disclosure Prohibited. No Recipient shall sell, sublicense, redistribute, syndicate, or otherwise transfer Identified Tier records to any third party. Internal disclosure within the Recipient\'s organization is permitted strictly on a need-to-know basis for the Permitted Uses set out in §4.'),
      Clause('6.4', 'Each Recipient shall promptly notify the Privacy Officer of any actual or suspected breach of these Terms, of the security of Property Records, or of any complaint received from an Owner relating to a Property Record, in accordance with the breach reporting timelines stipulated in the Recipient\'s licensing agreement and in any event no later than seventy-two (72) hours after discovery.'),
      Clause('6.5', 'Each Recipient shall, upon Falconia\'s request, return or securely destroy all Property Records within thirty (30) days of termination of the licensing agreement, and shall provide written certification of such return or destruction.'),
      h('div', { key: 'cr-6', style: S.crossref }, 'See also: Privacy Policy §9 (Data Security); Data Processing §8 (Withdrawal Mechanism).'),

      // 7. DATA RETENTION
      h('h2', { key: 'h-7', id: 'tos-7', style: S.h2 }, '7. Data Retention'),
      Clause('7.1', 'Property Records are retained by Falconia only as long as necessary for the purposes for which they were collected, in accordance with PIPEDA Principle 5 (Limiting Use, Disclosure, and Retention) and as further described in §11 of the Privacy Policy.'),
      Clause('7.2', 'De-identified Tier aggregates may be retained indefinitely for research and analytic purposes, on the basis that no individual is identifiable from such aggregates.'),
      Clause('7.3', 'Where an Owner withdraws Consent in accordance with §8 of the Privacy Policy, the corresponding Identified Tier record shall be redacted from active inventories and from all downstream Recipient-facing systems within thirty (30) days of receipt of the withdrawal notice. Falconia shall instruct Recipients to delete the affected record on the same timeline, and Recipients shall comply.'),
      Clause('7.4', 'Source Material is retained by the Affiliated Service Provider in accordance with its own privacy policy. Falconia retains only such Source Material as is reasonably necessary to validate, audit, or reproduce a Property Record.'),

      // 8. LIMITATION OF LIABILITY
      h('h2', { key: 'h-8', id: 'tos-8', style: S.h2 }, '8. Limitation of Liability'),
      Clause('8.1', 'Property Records are provided on an "as is" and "as available" basis. Falconia makes no representation or warranty, express or implied, as to the accuracy, completeness, fitness for any particular purpose, or non-infringement of Property Records, except as set out in the applicable Recipient licensing agreement.'),
      Clause('8.2', 'To the maximum extent permitted by law, Falconia\'s aggregate liability to any Recipient in respect of any claim arising out of or in connection with the Services shall not exceed the fees paid by the Recipient to Falconia in the twelve (12) months immediately preceding the event giving rise to the claim.'),
      Clause('8.3', 'In no event shall Falconia be liable for any indirect, incidental, consequential, special, exemplary, or punitive damages, including without limitation lost profits, lost data, or loss of goodwill, even if advised of the possibility of such damages.'),
      Clause('8.4', 'Nothing in these Terms shall limit or exclude any liability that cannot lawfully be limited or excluded, including liability for fraud, wilful misconduct, or breach of statutory privacy obligations owed directly to an Owner.'),
      Clause('8.5', 'To the extent permitted by law, neither party shall be liable for any delay or failure in performing its obligations under these Terms where such delay or failure results from events beyond the affected party\'s reasonable control, including without limitation acts of God, pandemic, government action, labour disputes, third-party infrastructure outages, and cyberattacks. The affected party shall notify the other party promptly and shall use reasonable efforts to mitigate the impact.'),

      // 9. GOVERNING LAW
      h('h2', { key: 'h-9', id: 'tos-9', style: S.h2 }, '9. Governing Law and Jurisdiction'),
      Clause('9.1', 'These Terms shall be governed by and construed in accordance with the laws of the Province of Manitoba and the federal laws of Canada applicable therein, without regard to conflict-of-laws principles.'),
      Clause('9.2', 'The parties irrevocably attorn to the exclusive jurisdiction of the courts sitting in the City of Winnipeg, in the Province of Manitoba, in respect of any dispute arising out of or in connection with these Terms, except that Falconia may seek injunctive or equitable relief in any court of competent jurisdiction.'),
      Clause('9.3', 'Before initiating any formal legal proceeding arising out of or relating to these Terms or any licensing agreement (other than a request for injunctive or equitable relief), the claiming party shall deliver written notice to the other party describing the dispute in reasonable detail and shall allow sixty (60) days from receipt of such notice for good-faith resolution efforts. This pre-litigation notice requirement does not limit either party\'s right to seek interim or conservatory relief.'),
      Clause('9.4', 'Owners retain at all times their right to file a complaint with the Office of the Privacy Commissioner of Canada or with any applicable provincial privacy commissioner, irrespective of these Terms.'),

      // 10. TERMINATION
      h('h2', { key: 'h-10', id: 'tos-10', style: S.h2 }, '10. Termination'),
      Clause('10.1', 'Either party may terminate a Recipient licensing agreement for convenience on not less than thirty (30) days written notice to the other party.'),
      Clause('10.2', 'Falconia may terminate a Recipient licensing agreement immediately on written notice if the Recipient commits a material breach of any provision of these Terms, including but not limited to: (a) breach of the No-Outreach Clause (§5); (b) the prohibition on onward disclosure (§6.3); (c) the prohibition on re-identification (§3.3); (d) failure to maintain the safeguards required by §6.1; or (e) failure to notify the Privacy Officer of a breach within the timeline required by §6.4.'),
      Clause('10.3', 'On termination, the Recipient shall return or securely destroy all Property Records within thirty (30) days and provide written certification, as set out in §6.5.'),
      Clause('10.4', 'Sections 5 (No-Outreach), 6 (Recipient Obligations), 7 (Data Retention), 8 (Limitation of Liability), and 9 (Governing Law) survive termination of the licensing agreement.'),

      // 11. ASSIGNMENT
      h('h2', { key: 'h-11', id: 'tos-11', style: S.h2 }, '11. Assignment'),
      Clause('11.1', 'The Recipient may not assign, transfer, or sublicense its rights under these Terms or any licensing agreement without the prior written consent of the Privacy Officer.'),
      Clause('11.2', 'Falconia may assign these Terms and any licensing agreement to a successor entity. The protections of these Terms and the Privacy Policy, and all Owner rights and opt-out mechanisms set out in them, continue to apply following any such assignment.'),
      Clause('11.3', 'All intellectual property in the methodology, processing techniques, and structured formats used to produce Property Records remains with Falconia. Licensing of Property Records does not transfer ownership of, or any intellectual property rights in, the underlying methodology.'),

      // 12. INDEMNIFICATION
      h('h2', { key: 'h-12', id: 'tos-12', style: S.h2 }, '12. Indemnification'),
      Clause('12.1', 'Each Recipient shall indemnify and hold harmless Falconia, its officers, directors, and employees from and against any loss, liability, cost, or expense (including reasonable legal fees) arising from or in connection with: (a) the Recipient\'s breach of these Terms; (b) the Recipient\'s breach of the No-Outreach Clause; (c) any unauthorized disclosure, re-identification attempt, or misuse of Property Records by the Recipient or its personnel; and (d) any complaint, investigation, or order arising under PIPEDA or any equivalent statute as a result of the Recipient\'s actions.'),

      // 13. GENERAL
      h('h2', { key: 'h-13', id: 'tos-13', style: S.h2 }, '13. General'),
      Clause('13.1', 'If any provision of these Terms is found to be unenforceable, the remaining provisions continue in full force and effect.'),
      Clause('13.2', 'These Terms, together with the Privacy Policy, the Data Processing description, and any applicable Recipient licensing agreement, constitute the entire agreement between the parties in respect of the subject matter hereof.'),

      // 14. CONTACT
      h('h2', { key: 'h-14', id: 'tos-14', style: S.h2 }, '14. Contact and Privacy Officer'),
      Clause('14.1', 'The Privacy Officer is the designated point of contact for all matters arising under these Terms, the Privacy Policy, and the Data Processing description. The Privacy Officer may be reached at support@falconia.ca.'),
      Clause('14.2', 'The Privacy Officer email is the sole point of contact for the Site, consistent with Falconia\'s role as a non-consumer-facing record processor.'),
      h('div', { key: 'cr-14', style: S.crossref }, 'See also: Privacy Policy §13 (Privacy Officer Contact).')
    ]);
  }

  // ============================================================
  // PRIVACY POLICY
  // ============================================================
  function PrivacySection() {
    var toc = [
      ['1.',  'Information We Process',          'pp-1'],
      ['2.',  'Sources of Information',          'pp-2'],
      ['3.',  'Purposes of Processing',          'pp-3'],
      ['4.',  'Disclosure to Third Parties',     'pp-4'],
      ['5.',  'Record Description',              'pp-5'],
      ['6.',  'Consent',                         'pp-6'],
      ['7.',  'De-identification Methodology',   'pp-7'],
      ['8.',  'Individual Rights',               'pp-8'],
      ['9.',  'Data Security',                   'pp-9'],
      ['10.', 'Cross-Border Transfers',          'pp-10'],
      ['11.', 'Retention Periods',               'pp-11'],
      ['12.', 'Changes to This Policy',          'pp-12'],
      ['13.', 'Privacy Officer Contact',         'pp-13']
    ];

    return Section({ id: 'privacy' }, [
      SectionHead('Policy', 'Privacy Policy'),
      h('div', { key: 'meta', style: S.sectionMeta },
        'Effective ' + EFFECTIVE_DATE + ' · Version ' + VERSION
      ),
      h('div', { key: 'sum', style: S.summaryBox },
        'This policy explains what Falconia handles, where it comes from, who sees it, and how homeowners can opt out.'
      ),
      h('p', { key: 'pre' },
        'This Privacy Policy explains what information Falconia handles, where it comes from, what it is used for, who receives it, and what rights property owners have under PIPEDA. ',
        'It should be read together with the ', h('a', { href: '#/terms' }, 'Terms of Service'),
        ' and ', h('a', { href: '#/processing' }, 'Data Processing'), ' description.'
      ),

      // 1. INFORMATION WE PROCESS
      h('h2', { key: 'h-1', id: 'pp-1', style: S.h2 }, '1. Information We Process'),
      Clause('1.1', 'Falconia processes personal information in respect of Subject Properties at which Owners have provided Consent at the service booking flow. The personal information processed by Falconia comprises the categories enumerated in §5 below and includes, in respect of the Identified Tier, the civic address of the Subject Property and the structured attributes derived from the Source Material.'),
      Clause('1.2', 'Falconia processes exterior, observable property characteristics only.'),
      Clause('1.3', 'The Site operates with no cookies, tracking pixels, fingerprinting scripts, or analytics as of the effective date of this Policy. Should this position change, this Policy will be amended in accordance with §12 below and a cookie notice will be implemented.'),

      // 2. SOURCES
      h('h2', { key: 'h-2', id: 'pp-2', style: S.h2 }, '2. Sources of Information'),
      Clause('2.1', 'All Source Material is obtained by the Affiliated Service Provider during a service visit to the Subject Property and transmitted to Falconia for processing. Source Material includes, without limitation:'),
      h('ol', { key: 'src-list' }, [
        h('li', { key: 's1' }, 'Thermal recordings of the building envelope captured by drone, including roof, walls, windows, and adjacent structures.'),
        h('li', { key: 's2' }, 'Visible-spectrum imagery of the Subject Property exterior captured by drone or hand-held camera at ground level.'),
        h('li', { key: 's3' }, 'Contemporaneous metadata, including date, time, weather, and equipment identifiers.'),
        h('li', { key: 's4' }, 'The civic address of the Subject Property as supplied by the Owner at the service booking flow.')
      ]),
      Clause('2.2', 'All collection is performed by the Affiliated Service Provider in the course of a service visit and in accordance with the Affiliated Service Provider\'s privacy policy and the Consent obtained by the Affiliated Service Provider.'),
      Clause('2.3', 'Falconia may, from time to time, supplement Property Records with information obtained from public sources, including municipal property assessment rolls, parcel and zoning records, and other public registries, where such supplementation is necessary to validate or contextualize the Source Material.'),

      // 3. PURPOSES
      h('h2', { key: 'h-3', id: 'pp-3', style: S.h2 }, '3. Purposes of Processing'),
      h('p', { key: 'pur-pre' },
        'In accordance with PIPEDA Principle 2 (Identifying Purposes), Falconia processes personal information for the following identified purposes, and no others:'
      ),
      h('ol', { key: 'pur-list' }, [
        h('li', { key: 'pur1' }, 'Conversion of Source Material into structured Property Records.'),
        h('li', { key: 'pur2' }, 'Tier classification, packaging, and licensing of Property Records to qualified Recipients as set out in the Terms of Service §§3 and 4.'),
        h('li', { key: 'pur3' }, 'De-identification at FSA resolution and the production of De-identified Tier aggregates for research, analytic, and planning purposes.'),
        h('li', { key: 'pur4' }, 'Quality control, audit, and lifecycle management of Property Records.'),
        h('li', { key: 'pur5' }, 'Compliance with applicable law, including PIPEDA, response to lawful requests from regulators, and defence of legal claims.')
      ]),
      Clause('3.1', 'Falconia uses personal information solely for the purposes identified in this section. Any additional purpose requires renewed Consent from the Owner through the Affiliated Service Provider or, where appropriate, directly.'),

      // 4. DISCLOSURE
      h('h2', { key: 'h-4', id: 'pp-4', style: S.h2 }, '4. Disclosure to Third Parties'),
      h('p', { key: 'd-pre' },
        'Falconia licenses Property Records to approved commercial recipients. ',
        'Falconia is, in this respect, a record licensor. Recipients are bound by the Terms of Service, including the No-Outreach Clause set out at §5 thereof, and by individually negotiated written licensing agreements that incorporate these documents by reference.'
      ),
      h('p', { key: 'd-cat' }, 'Falconia may disclose Property Records to the following categories of Recipients, subject to the tier and use restrictions stated below:'),
      Clause('4(a)', 'Property and casualty insurers may receive Identified Tier and De-identified Tier records for the purposes of underwriting, rating, renewal review, and exterior risk assessment.'),
      Clause('4(b)', 'Mortgage lenders and servicers may receive Identified Tier and De-identified Tier records for the purposes of origination, refinance, portfolio due diligence, and property condition verification.'),
      Clause('4(c)', 'Contractors and trades may receive Identified Tier records on a restricted basis, solely for scoping and estimation in relation to a property already under written contract or a formal estimate request initiated by the Owner.'),
      Clause('4(d)', 'Researchers, journalists, and academics may receive De-identified Tier records only, for the purposes of public-records-style research, urban analytics, and policy analysis.'),
      Clause('4(e)', 'Government and regulatory bodies may receive records of either tier as required by law, including lawful requests, regulatory compliance obligations, and court orders.'),
      Clause('4(f)', 'No category of Recipient not enumerated in §4(a) through §4(e) may receive Property Records unless first approved in writing by the Privacy Officer.'),
      Clause('4.1', 'Falconia requires each Recipient to execute a written licensing agreement before receiving any Property Record. The licensing agreement incorporates these Terms and the Privacy Policy by reference and includes the No-Outreach Clause, data security requirements, and permitted use restrictions.'),
      Clause('4.2', 'Falconia maintains a register of Recipients and the dates on which Property Records were disclosed to them. This register is available for inspection by the Privacy Commissioner of Canada upon request.'),
      h('div', { key: 'cr-4', style: S.crossref }, 'See also: Terms of Service §4 (Permitted Uses); Terms of Service §5 (No-Outreach Clause).'),

      // 5. RECORD DESCRIPTION
      h('h2', { key: 'h-5', id: 'pp-5', style: S.h2 }, '5. Record Description'),
      h('p', { key: 'pp5-pre' },
        'Each Property Record comprises a structured set of exterior-observable attributes, derived from Source Material collected during a single service visit. ',
        'The minimum enumeration is set out in §5 of the Data Processing description. ',
        'Attributes are limited to the observable exterior of the Subject Property. ',
        'Interior characteristics, personal effects, and occupant behavior are excluded.'
      ),
      Clause('5.1', 'The categories of personal information contained in an Identified Tier record include: the civic address of the Subject Property, exterior structural attributes (roof, siding, windows, foundation), exterior fixture attributes (gutters, chimney, solar panels, deck, garage), yard and landscaping attributes, thermal performance indicators, and indicative property dimensions. The full enumeration appears in §5 of the Data Processing description.'),

      // 6. CONSENT
      h('h2', { key: 'h-6', id: 'pp-6', style: S.h2 }, '6. Consent'),
      Clause('6.1', 'Consent is obtained by the Affiliated Service Provider at the point of service booking, prior to any collection of Source Material. The Consent mechanism requires the Owner to affirmatively acknowledge: (a) that exterior observations and thermal recordings will be captured during the service visit; (b) that such material will be transmitted to Falconia for processing into structured Property Records; and (c) that Falconia may license, sell, or otherwise provide those Property Records to approved commercial recipients under the conditions described in these Terms and the Privacy Policy.'),
      Clause('6.2', 'Consent is opt-in and is not bundled with the service itself. An Owner may receive the service without providing Consent for data processing by Falconia. In such a case, the Affiliated Service Provider shall perform the service but shall not capture or transmit Source Material to Falconia.'),
      Clause('6.3', 'An Owner may withdraw Consent at any time by contacting the Privacy Officer as described in §8 below. Withdrawal is prospective only and does not affect the lawfulness of processing performed prior to withdrawal.'),
      h('div', { key: 'cr-6', style: S.crossref }, 'See also: Data Processing §8 (Withdrawal Mechanism); Terms of Service §7 (Data Retention).'),

      // 7. DE-IDENTIFICATION
      h('h2', { key: 'h-7', id: 'pp-7', style: S.h2 }, '7. De-identification Methodology'),
      Clause('7.1', 'De-identification is performed by removing the civic address and all other direct identifiers from the Property Record and aggregating attributes to the Forward Sortation Area (FSA) level. The FSA is the first three characters of the Canadian postal code and represents a geographic area typically containing several thousand households.'),
      Clause('7.2', 'Cell-suppression rules are applied to De-identified Tier aggregates to prevent indirect identification: where an FSA cell contains fewer than a specified minimum number of properties, the cell is suppressed or combined with adjacent cells.'),
      Clause('7.3', 'The de-identification methodology is consistent with the guidance of the Office of the Privacy Commissioner of Canada on de-identification and with the general risk-based approach described in PIPEDA.'),
      h('div', { key: 'cr-7', style: S.crossref }, 'See also: Terms of Service §3 (Record Tiers); Data Processing §5 (Attribute Enumeration).'),

      // 8. INDIVIDUAL RIGHTS
      h('h2', { key: 'h-8', id: 'pp-8', style: S.h2 }, '8. Individual Rights'),
      h('p', { key: 'ir-pre' }, 'Under PIPEDA, an Owner whose personal information is held by Falconia has the right to:'),
      h('ol', { key: 'ir-list' }, [
        h('li', { key: 'ir1' }, 'Request access to the Property Record held by Falconia in respect of their Subject Property, and to receive a copy of such Property Record in a portable, machine-readable format.'),
        h('li', { key: 'ir2' }, 'Request correction of any inaccuracy in the Property Record. Falconia shall investigate and, where the request is well founded, correct the Property Record and notify Recipients to whom the affected record was disclosed within the preceding twelve (12) months.'),
        h('li', { key: 'ir3' }, 'Withdraw Consent prospectively, in which case Falconia shall remove the affected Identified Tier record from active inventories and instruct Recipients to delete the record within thirty (30) days, in accordance with Terms of Service §7.3.'),
        h('li', { key: 'ir4' }, 'Request information regarding the Recipients to whom the Owner\'s Property Record has been disclosed in the preceding twelve (12) months, subject to confidentiality obligations owed to Recipients.'),
        h('li', { key: 'ir5' }, 'Lodge a complaint with the Privacy Officer (§13) and, if dissatisfied with the response, with the Office of the Privacy Commissioner of Canada.')
      ]),
      Clause('8.1', 'Requests under this section may be addressed to the Privacy Officer at the e-mail address set out in §13. Falconia shall respond within thirty (30) days of receipt or, where an extension is necessary, shall notify the Owner of the extension and the reason therefor in accordance with PIPEDA s. 8.'),

      // 9. DATA SECURITY
      h('h2', { key: 'h-9', id: 'pp-9', style: S.h2 }, '9. Data Security'),
      Clause('9.1', 'Falconia maintains physical, administrative, and technical safeguards appropriate to the sensitivity of Property Records, in accordance with PIPEDA Principle 7 (Safeguards). Safeguards include encryption in transit and at rest, role-based access controls, audit logging, segregation of production and non-production environments, and an incident response procedure.'),

      Clause('10.1', 'Falconia processes and stores Property Records in Canada by default. Where any service provider engaged by Falconia processes personal information outside Canada, Falconia shall require contractual safeguards equivalent to those required by PIPEDA and shall disclose the country of processing on request.'),
      Clause('10.2', 'Recipients located outside Canada may receive Identified Tier records only where the Recipient has executed a written licensing agreement subjecting the Recipient to Manitoba law and incorporating the No-Outreach Clause and the safeguards described in Terms of Service §6. The country in which each such Recipient is located and processes Property Records shall be disclosed to the Owner on request.'),

  // DATA PROCESSING

        'This document is a supplement to the ',

        h('a', { href: '#/privacy' }, 'Privacy Policy'),

      Clause('2.3', 'The Affiliated Service Provider is the service provider to the Owner and the party that captures primary Consent. The legal architecture of Consent flows from the Owner to the Affiliated Service Provider to Falconia, in that order, with this Site providing the explicit disclosure layer required for the Consent to be informed.'),

      Clause('3.8', 'Stage 7 — Permitted Use. Recipients may use Property Records solely within the Permitted Uses enumerated at Terms of Service §4. The No-Outreach Clause applies for the duration of the licensing agreement and survives its termination.'),

      Clause('5.7', 'Attribute 7 — Yard condition: landscaping grade and visible maintenance state.'),
      Clause('5.8', 'Attribute 8 — Property square footage: indicative gross floor area derived from envelope measurement.'),

      Clause('5.10', 'Attribute 10 — Deck or patio: presence, material, and condition.'),
      Clause('5.11', 'Attribute 11 — Solar panels: presence, count, and indicative orientation.'),
      Clause('5.12', 'Attribute 12 — Chimney: presence, count, and visible condition.'),
      Clause('5.13', 'Attribute 13 — Foundation visible condition: visible portion only; no intrusive inspection.'),
      Clause('5.14', 'Attribute 14 — Gutter condition: material and visible condition.'),
      Clause('5.15', 'Attribute 15 — Exterior paint or stain: indicative condition rating.'),
      Clause('5.16', 'Attribute 16 — Driveway: material (asphalt, concrete, gravel, paver) and condition.'),
      Clause('5.17', 'Attribute 17 — Landscaping grade: composite indicator of soft and hard landscaping.'),
      h('div', { key: 'cr-5', style: S.crossref }, 'See also: Privacy Policy §5 (Record Description); Privacy Policy §7 (De-identification Methodology).'),

      // 6. PROCESSING AND STORAGE
      h('h2', { key: 'h-6', id: 'dp-6', style: S.h2 }, '6. Processing and Storage'),
      Clause('6.1', 'Source Material is ingested into a controlled processing environment, validated for quality, and processed by a combination of automated machine-vision extraction and manual quality control. Property Records are written to a structured store with row-level access controls.'),
      Clause('6.2', 'Property Records are stored in Canada by default. Encryption is applied in transit and at rest. Access is restricted to personnel with a documented operational need.'),
      Clause('6.3', 'De-identification, where applied, is performed within the controlled environment by application of the methodology described at Privacy Policy §7. Cell-suppression rules apply to small FSA cells.'),

      // 7. RECIPIENT CATEGORIES
      h('h2', { key: 'h-7', id: 'dp-7', style: S.h2 }, '7. Recipient Categories and Restrictions'),
      Clause('7.1', 'Recipients fall within the categories enumerated at Privacy Policy §4. Each Recipient is bound by a written licensing agreement incorporating the Terms of Service and Privacy Policy by reference.'),
      Clause('7.2', 'Identified Tier records are licensed only to Recipients that have acknowledged the No-Outreach Clause (Terms of Service §5) in writing and that have demonstrated to Falconia\'s reasonable satisfaction a legitimate business purpose falling within Terms of Service §4.'),
      Clause('7.3', 'De-identified Tier records may be licensed to a broader range of researchers, journalists, and analysts on the basis that no individual is identifiable.'),

        'Each material change to the Terms, Privacy Policy, or Data Processing description is recorded below with its effective date and a short note. The current version appears in the header and footer of every section.'
      ),

          return h('li', { key: i, style: S.changelogItem },

  // ============================================================
  // FOOTER
  // ============================================================
  function Footer() {
    return h('footer', { style: { padding: '48px 48px 40px', textAlign: 'center' }, className: 'fal-no-print' },
      h('div', { style: { display: 'flex', justifyContent: 'center', gap: '32px', flexWrap: 'wrap' } },
        h('a', { href: '#/terms', style: { color: '#1D1D1F', fontSize: '12px', textDecoration: 'none', borderBottom: 'none', transition: 'color 150ms' }, className: 'fal-footer-link' }, 'Terms'),
        h('a', { href: '#/privacy', style: { color: '#1D1D1F', fontSize: '12px', textDecoration: 'none', borderBottom: 'none', transition: 'color 150ms' }, className: 'fal-footer-link' }, 'Privacy'),
        h('a', { href: '#/processing', style: { color: '#1D1D1F', fontSize: '12px', textDecoration: 'none', borderBottom: 'none', transition: 'color 150ms' }, className: 'fal-footer-link' }, 'Processing'),
        h('a', { href: 'mailto:' + PRIVACY_EMAIL, style: { color: '#1D1D1F', fontSize: '12px', textDecoration: 'none', borderBottom: 'none', transition: 'color 150ms' }, className: 'fal-footer-link' }, PRIVACY_EMAIL)
      )
    );
  }

  // ============================================================
  // ROUTER
  // ============================================================
  function getRoute() {
    var hash = window.location.hash || '';
    if (hash.indexOf('#/processing') === 0) return 'processing';
    if (hash.indexOf('#/privacy') === 0) return 'privacy';
    if (hash.indexOf('#/terms') === 0) return 'terms';
    if (hash.indexOf('#/platform/dronemeasure') === 0) return 'dronemeasure';
    if (hash.indexOf('#/platform/autoadmin') === 0) return 'autoadmin';
    if (hash.indexOf('#/platform/quoteengine') === 0) return 'quoteengine';
    if (hash.indexOf('#/platform') === 0) return 'platform';
    return 'home';
  }

  function navigate(route) {
    window.location.hash = '#/' + route;
  }

  // ============================================================
  // SCROLL REVEAL OBSERVER
  // ============================================================
  function useScrollReveal() {
    React.useEffect(function () {
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('fal-visible');
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

      function observe() {
        document.querySelectorAll('.fal-reveal').forEach(function (el) {
          observer.observe(el);
        });
      }
      // Observe after render
      setTimeout(observe, 100);
      return function () { observer.disconnect(); };
    });
  }

  // ============================================================
  // APP
  // ============================================================
  function App() {
    var routeState = React.useState(getRoute());
    var route = routeState[0];
    var setRoute = routeState[1];

    React.useEffect(function () {
      function onHash() {
        var r = getRoute();
        setRoute(r);
        window.scrollTo(0, 0);
      }
      window.addEventListener('hashchange', onHash);
      return function () { window.removeEventListener('hashchange', onHash); };
    }, []);

    var content;
    if (route === 'processing') {
      content = h(React.Fragment, null, h(DataProcessingSection), h(ChangelogSection));
    } else if (route === 'privacy') {
      content = h(React.Fragment, null, h(PrivacySection), h(ChangelogSection));
    } else if (route === 'terms') {
      content = h(React.Fragment, null, h(TermsSection), h(ChangelogSection));
    } else if (route === 'platform') {
      content = h(PlatformIndex);
    } else if (route === 'dronemeasure') {
      content = h(DroneMeasurePage);
    } else if (route === 'autoadmin') {
      content = h(AutoAdminPage);
    } else if (route === 'quoteengine') {
      content = h(QuoteEnginePage);
    } else {
      content = h(Hero);
    }

    useScrollReveal();

    return h(React.Fragment, null,
      h(Header),
      h('div', { key: route, className: 'fal-route-enter' }, content),
      h(Footer)
    );
  }

  var root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(h(App));
})();
</script>
